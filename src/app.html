<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/assets/img/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>BSides312 2026 - Chicago's Biggest Little Non-Profit Hacking Conference</title>
		<meta
			name="description"
			content="BSides312 2026 — Chicago's biggest little non-profit hacking & Cybersecurity conference. May 16, 2026 at the Irish American Heritage Center. Talks, workshops, and networking with security professionals."
		/>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://bsides312.org/" />
		<meta property="og:site_name" content="BSides312" />
		<meta property="og:title" content="BSides312 2026 — Chicago's Biggest Little Hacking Conference | May 16" />
		<meta
			property="og:description"
			content="Chicago's biggest little non-profit hacking & Cybersecurity conference. May 16, 2026 at the Irish American Heritage Center. Talks, workshops, and networking."
		/>
		<meta property="og:image" content="https://bsides312.org/assets/img/opengraph_logo.jpg" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://bsides312.org/" />
		<meta property="twitter:site" content="@bsides312" />
		<meta property="twitter:title" content="BSides312 2026 — May 16 | Chicago" />
		<meta
			property="twitter:description"
			content="Chicago's biggest little non-profit hacking & Cybersecurity conference. May 16, 2026 at the Irish American Heritage Center."
		/>
		<meta property="twitter:image" content="https://bsides312.org/assets/img/opengraph_logo.jpg" />

		<!-- TODO: replace placeholder badge at /assets/img/badge-draft.svg before launch -->

		<!-- Google Fonts -->
		<link
			href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,700,700i|Raleway:300,400,500,700,800"
			rel="stylesheet"
		/>

		<!-- Bootstrap CSS -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>

		<!-- Bootstrap Icons -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Bootstrap JS -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
