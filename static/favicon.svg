<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#2979ff"/>
    </linearGradient>
    <filter id="glow-heavy">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#06080f"/>

  <!-- Ambient glow behind text -->
  <ellipse cx="32" cy="34" rx="22" ry="10" fill="#00b0ff" opacity="0.08" filter="url(#glow-soft)"/>

  <!-- Shadow layer - wide diffuse glow -->
  <text x="32" y="40" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="24" fill="#00e5ff" text-anchor="middle" letter-spacing="1" opacity="0.3" filter="url(#glow-soft)">312</text>

  <!-- Mid glow layer -->
  <text x="32" y="40" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="24" fill="#00e5ff" text-anchor="middle" letter-spacing="1" filter="url(#glow-heavy)">312</text>

  <!-- Crisp top layer - white hot center -->
  <text x="32" y="40" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="24" fill="#ffffff" text-anchor="middle" letter-spacing="1">312</text>
</svg>
